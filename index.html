<head>
<meta charset="utf-8">

<style>
  :root {
    --bg: #0e0f12;
    --panel: #16181d;
    --panel-2: #1c1f26;
    --border: #2a2e38;
    --text: #e7e9ee;
    --muted: #8a93a4;
    --amber: #f59e0b;
    --accent: #6ee7b7;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
  header {
    position: sticky; top: 0; z-index: 10;
    background: rgba(14,15,18,0.92);
    backdrop-filter: saturate(140%) blur(10px);
    border-bottom: 1px solid var(--border);
    padding: 14px 22px;
    display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
  }
  h1 { font-size: 15px; font-weight: 600; margin: 0; letter-spacing: 0.2px; flex: 1; }
  h1 small { color: var(--muted); font-weight: 400; margin-left: 8px; }
  header .actions { display: flex; gap: 8px; }
  header button {
    background: var(--panel-2); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 6px 12px; font-size: 12px; font-weight: 600;
    cursor: pointer; font-family: inherit;
  }
  header button:hover { border-color: var(--accent); color: var(--accent); }
  header button.danger:hover { border-color: #f87171; color: #f87171; }
  .status { font-size: 11px; color: var(--muted); margin-left: 8px; min-width: 90px; }
  .status.saved { color: var(--accent); }
  main { padding: 22px; }
  .section-header { margin: 8px 0 18px; }
  .section-header:not(:first-child) { margin-top: 44px; }
  .section-title { font-size: 26px; color: var(--text); letter-spacing: -0.2px; font-weight: 700; margin: 0 0 6px; }
  .section-title .count { color: var(--muted); font-weight: 400; font-size: 14px; margin-left: 10px; letter-spacing: 0; }
  .section-subtitle { font-size: 15px; color: var(--muted); line-height: 1.5; margin: 0; max-width: 760px; }
  .card-note {
    padding: 0 12px 10px;
    font-size: 12px; color: var(--amber);
    line-height: 1.4;
    font-style: italic;
  }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 18px; }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    display: flex; flex-direction: column;
    position: relative;
  }
  .card .num {
    position: absolute; top: 10px; left: 10px;
    background: rgba(0,0,0,0.78); color: #fff;
    border: 1px solid rgba(255,255,255,0.18);
    font-size: 13px; font-weight: 700;
    padding: 4px 9px; border-radius: 999px;
    font-variant-numeric: tabular-nums;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    z-index: 2;
    backdrop-filter: blur(4px);
  }
  .card img { width: 100%; height: auto; display: block; background: #000; cursor: zoom-in; }
  .meta {
    padding: 10px 12px 6px;
    font-size: 11px; color: var(--muted);
    word-break: break-all; line-height: 1.4;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  .copy { padding: 6px 12px 14px; display: flex; flex-direction: column; gap: 8px; }
  .copy-field { display: flex; flex-direction: column; gap: 2px; }
  .copy-label {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--muted); font-weight: 600;
  }
  .copy-value {
    font-size: 13px; line-height: 1.45; color: var(--text);
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 9px;
    outline: none;
    white-space: pre-wrap;
    min-height: 18px;
    transition: border-color 0.12s ease;
  }
  .copy-value:hover { border-color: #3a3f4d; }
  .copy-value:focus { border-color: var(--accent); background: #181c22; }
  .copy-value:empty::before {
    content: attr(data-placeholder);
    color: #4a5161; font-style: italic;
  }
  dialog.lightbox { border: none; padding: 0; background: rgba(0,0,0,0.92); max-width: 96vw; max-height: 96vh; }
  dialog.lightbox::backdrop { background: rgba(0,0,0,0.85); }
  dialog.lightbox img { max-width: 92vw; max-height: 92vh; display: block; }
</style>

  const SECTIONS = [

  function resolve(item, sectionRemote) {
    if (typeof item === "string") return { path: item, remote: sectionRemote, note: null };
    if (item.url) return { path: item.url, remote: item.remote, note: item.note || null };
    return { path: item.path, remote: sectionRemote, note: item.note || null };
  }

  function loadEdits() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}"); }
    catch { return {}; }
  }
  function saveEdits(edits) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(edits));
  }
  let EDITS = loadEdits();

  function getCopy(label) {
    const base = DEFAULT_COPY[label] || { primary_text: "", headline: "" };
    const override = EDITS[label] || {};
    return {
      primary_text: override.primary_text ?? base.primary_text,
      headline: override.headline ?? base.headline,
    };
  }

  function setStatus(text, saved) {
    const el = document.getElementById("status");
    el.textContent = text;
    el.classList.toggle("saved", !!saved);
  }
  let statusTimer = null;
  function flashSaved() {
    setStatus("saved ✓", true);
    clearTimeout(statusTimer);
    statusTimer = setTimeout(() => setStatus("edits autosave", false), 1200);
  }

  const main = document.getElementById("main");
  const lb = document.getElementById("lightbox");
  const lbImg = document.getElementById("lightbox-img");
  lb.addEventListener("click", () => lb.close());

  function renderCopy(label) {
    const c = getCopy(label);
    const fields = [
      ["primary_text", "Primary text"],
      ["headline", "Headline"],
    ];
    return `<div class="copy">
      ${fields.map(([key, lbl]) => `
        <div class="copy-field">
          <div class="copy-label">${lbl}</div>
          <div class="copy-value" contenteditable="true" spellcheck="true"
               data-label="${label}" data-key="${key}"
               data-placeholder="Add ${lbl.toLowerCase()}…">${escapeHtml(c[key] || "")}</div>
        </div>
      `).join("")}
    </div>`;
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, ch => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"})[ch]);
  }

  function render() {
    main.innerHTML = "";
    let n = 0;
    for (const section of SECTIONS) {
      const header = document.createElement("div");
      header.className = "section-header";
      const subtitleHTML = section.subtitle ? `<p class="section-subtitle">${section.subtitle}</p>` : "";
      header.innerHTML = `<h2 class="section-title">${section.title}<span class="count">${section.items.length} images</span></h2>${subtitleHTML}`;
      main.appendChild(header);

      const grid = document.createElement("div");
      grid.className = "grid";
      main.appendChild(grid);

      for (const rawItem of section.items) {
        n++;
        const num = n;
        const { path: item, remote, note } = resolve(rawItem, section.remote);
        const src = remote ? item : "images/" + item.split("/").pop();
        const label = item.split("/").pop().split("?")[0];

        const card = document.createElement("div");
        card.className = "card";
        const noteHTML = note ? `<div class="card-note">Note: ${note}</div>` : "";
        card.innerHTML = `
          <div class="num">#${num}</div>
          <img src="${src}" alt="${label}" loading="lazy">
          <div class="meta">${label}</div>
          ${noteHTML}
          ${renderCopy(label)}`;
        card.querySelector("img").addEventListener("click", () => {
          lbImg.src = src;
          lb.showModal();
        });
        grid.appendChild(card);
      }
    }

    main.querySelectorAll(".copy-value").forEach(el => {
      el.addEventListener("input", () => {
        const label = el.dataset.label;
        const key = el.dataset.key;
        const value = el.innerText;
        if (!EDITS[label]) EDITS[label] = {};
        EDITS[label][key] = value;
        saveEdits(EDITS);
        flashSaved();
      });
      el.addEventListener("paste", e => {
        e.preventDefault();
        const text = (e.clipboardData || window.clipboardData).getData("text/plain");
        document.execCommand("insertText", false, text);
      });
    });
  }

  function exportPayload() {
    const out = {};
    let n = 0;
    for (const section of SECTIONS) {
      for (const rawItem of section.items) {
        n++;
        const { path: item } = resolve(rawItem, section.remote);
        const label = item.split("/").pop().split("?")[0];
        out[label] = { num: n, section: section.title, ...getCopy(label) };
      }
    }
    return out;
  }

  document.getElementById("copy-json").addEventListener("click", async () => {
    const text = JSON.stringify(exportPayload(), null, 2);
    try {
      await navigator.clipboard.writeText(text);
      setStatus("JSON copied ✓", true);
      setTimeout(() => setStatus("edits autosave", false), 1500);
    } catch {
      setStatus("copy failed — use download", false);
    }
  });

  document.getElementById("download-json").addEventListener("click", () => {
    const text = JSON.stringify(exportPayload(), null, 2);
    const blob = new Blob([text], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "golfballs_r4_copy.json";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  });

  document.getElementById("reset").addEventListener("click", () => {
    if (!confirm("Reset all copy edits back to defaults? This cannot be undone.")) return;
    EDITS = {};
    saveEdits(EDITS);
    render();
    setStatus("reset to defaults", false);
  });

  render();
</script>
